spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/users-db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          format_sql: true
server:
  servlet:
    context-path: /v1/api